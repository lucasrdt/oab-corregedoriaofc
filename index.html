<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Título e descrição padrão (serão substituídos pelo SiteContext) -->
  <title>Carregando...</title>
  <meta name="description" content="Carregando site...">

  <!-- Favicon padrão branco (será substituído pelo SiteContext de cada site) -->
  <link rel="icon" type="image/jpeg" href="/favicon.jpg" />

  <!-- Preconnect para fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">

  <!-- Open Graph - serão atualizados dinamicamente -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Carregando..." />
  <meta property="og:description" content="Carregando..." />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/entry.tsx"></script>
</body>

</html>
